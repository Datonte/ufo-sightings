<body class="font-body min-h-screen flex flex-col items-center relative overflow-x-hidden bg-surface selection:bg-primary-container selection:text-on-primary">

</div>
<!-- Biometric Visualizer -->

<img alt="Biometric Iris Scan" class="w-48 h-48 md:w-56 md:h-56 object-cover opacity-80 mix-blend-screen filter grayscale contrast-150 sepia-[.7] hue-rotate-[70deg]" data-alt="abstract glowing digital eye iris scan visualization in neon green on black background, high-tech interface style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5NmmMjhbK1zHND4SgrA09wqVfwjJhlDrofpODp5tYbT5L2i2FnGK4YhxEyP7NtuRo69wQy_Aq3HhjS7zMsz25UGrSCnhQ9_5-dqm-tLpFQl43cJH6NO6wAEaUOLOBXdcf4GHNX3pk-e6bB73EZxd3YajcTqxXdeaFJ-9XHPRhzljPz4SYVjOGYpiWVn7F0HRx-dsxzh-jpVL2vSTHTr4waXXzhVw_JJHd6eX9bIaz1EBgY0unsrMvVVFipKHjLY_CjOyDJXaViJg"/>
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-outline-variant/40"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-outline-variant/40"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-outline-variant/40"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-outline-variant/40"></div>

</div>
</section>
<!-- Right: Login Form -->
<section class="glass-panel p-6 md:p-10 flex flex-col space-y-8 w-full max-w-md mx-auto order-1 lg:order-2 border border-outline-variant/15 relative">
<div class="absolute top-0 left-0 w-full h-1 bg-surface-variant">
<div class="h-full bg-secondary-container w-1/3"></div>
</div>
<div class="space-y-1">
<h3 class="font-headline text-xl font-bold uppercase tracking-widest text-on-surface">Terminal Access</h3>
<p class="font-mono text-xs text-on-surface-variant uppercase tracking-wider">AERIAL PHENOMENA MONITOR</p>
</div>
<form class="space-y-6" onsubmit="window.location.href='../global_surveillance_dashboard/code.html'; return false;">
<!-- Operative ID -->
<div class="space-y-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant flex justify-between">
<span>Operative ID</span>

</label>
<div class="relative">
<span class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-sm px-2" data-icon="badge">badge</span>

</div>
</div>
<!-- Secure PIN Keypad Area -->
<div class="space-y-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant flex justify-between">
<span>Access Code</span>
<span class="font-mono text-primary-fixed-dim">[REQ]</span>
</label>
<div class="relative mb-4">
<span class="absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-sm px-2" data-icon="password">password</span>
<input id="pin-input" class="w-full bg-transparent border-0 border-b border-surface-variant text-on-surface font-mono py-3 pl-8 pr-3 focus:ring-0 focus:border-secondary-container placeholder:text-on-surface-variant/30 transition-colors tracking-[0.5em] text-lg" placeholder="••••••••" type="password"/>
</div>
<!-- Keypad -->

<button class="bg-surface-container hover:bg-surface-container-high text-on-surface font-mono py-3 transition-colors border border-outline-variant/10" type="button" onclick="pinPress('1')">1</button>

<button class="bg-surface-container hover:bg-surface-container-high text-on-surface font-mono py-3 transition-colors border border-outline-variant/10" type="button" onclick="pinPress('8')">8</button>
<button class="bg-surface-container hover:bg-surface-container-high text-on-surface font-mono py-3 transition-colors border border-outline-variant/10" type="button" onclick="pinPress('9')">9</button>

<button class="bg-surface-container hover:bg-surface-container-high text-primary-fixed font-mono py-3 transition-colors border border-outline-variant/10 uppercase text-xs" type="button" onclick="pinEnter()">Ent</button>
</div>
</div>
<!-- Submit Action -->
<button class="w-full terminal-gradient text-on-primary font-headline font-bold uppercase tracking-[0.2em] py-4 mt-6 flex items-center justify-center space-x-2 hover:opacity-90 transition-opacity active:scale-[0.98]" type="submit">
<span>Initiate Authentication</span>
<span class="material-symbols-outlined text-sm" data-icon="login">login</span>
</button>
</form>

</main>
<!-- Technical Display Box Footer -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-surface-variant p-2 md:p-4 z-20">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-on-surface-variant font-mono text-[10px] md:text-xs uppercase tracking-widest space-y-2 md:space-y-0">
<div class="flex items-center space-x-4">
<span class="flex items-center space-x-1 text-secondary-fixed-dim">
<span class="w-2 h-2 rounded-full bg-secondary-fixed-dim animate-pulse"></span>
<span>System Status: Encrypted Connection</span>
</span>
<span class="hidden md:inline text-surface-variant">|</span>
<span class="hidden md:inline">Protocol V.9.4.2 — <span id="footer-clock">--:--:-- UTC</span></span>
</div>
<div class="flex items-center space-x-2 mr-4">
<a class="flex items-center justify-center w-8 h-8 bg-surface-container-low border border-outline-variant/20 hover:border-primary-fixed hover:text-primary-fixed transition-colors" href="#">
<span class="material-symbols-outlined text-sm">X</span>
</a>
<a class="flex items-center justify-center w-8 h-8 bg-surface-container-low border border-outline-variant/20 hover:border-primary-fixed hover:text-primary-fixed transition-colors" href="#">
<span class="material-symbols-outlined text-sm">monitoring</span>
</a>
</div><div class="flex items-center space-x-2 bg-surface-container-low px-3 py-1 border border-outline-variant/20 px-4">
<span class="text-on-surface-variant/50">CONTRACT ADDRESS:</span>
<span class="text-primary-container break-all max-w-[200px] md:max-w-none overflow-hidden text-ellipsis whitespace-nowrap">0x0000...0000</span>
<button class="hover:text-primary-fixed ml-2 transition-colors">
<span class="material-symbols-outlined text-xs" data-icon="content_copy">content_copy</span>
</button>
</div>
</div>
</footer>
<script>
// CHANGE 2: Status text cycling
const AUTH_STATES = [
  'Sys_Node_Auth: Awaiting Input',
  'Sys_Node_Auth: Scanning Biometrics...',
  'Sys_Node_Auth: Cross-Referencing Database...',
  'Sys_Node_Auth: Verifying Clearance Level...',
  'Sys_Node_Auth: Awaiting Input',
];
let authIdx = 0;
setInterval(() => {
  authIdx = (authIdx + 1) % AUTH_STATES.length;
  const el = document.getElementById('auth-status');
  if (el) el.textContent = AUTH_STATES[authIdx];
}, 3000);

// CHANGE 3: Functional keypad
function pinPress(digit) {
  const inp = document.getElementById('pin-input');
  if (inp && inp.value.length < 8) inp.value += digit;
}
function pinBack() {
  const inp = document.getElementById('pin-input');
  if (inp) inp.value = inp.value.slice(0, -1);
}
function pinEnter() {
  document.querySelector('form').dispatchEvent(new Event('submit', {bubbles:true, cancelable:true}));
}

// CHANGE 4: Live footer clock
function updateFooterClock() {
  const now = new Date();
  const t = [now.getUTCHours(), now.getUTCMinutes(), now.getUTCSeconds()].map(n => String(n).padStart(2,'0')).join(':');
  const el = document.getElementById('footer-clock');
  if (el) el.textContent = t + ' UTC';
}
updateFooterClock();
setInterval(updateFooterClock, 1000);
</script>
